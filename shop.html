<!DOCTYPE html>
<html lang="en">
<head>
  <!-- product listing, shop -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Urban Threads</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <!-- Nav Bar Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Product Listing -->
  <main class="shop container">
    <div class="header">
      <h1>The Collection</h1>
      <p>Latest threads, curated for the streets.</p>
    </div>

    <!-- category filters -->
    <div class="filters" id="filters">
      <button class="filter active" data-category="all">All</button>
      <button class="filter" data-category="Hoodies">Hoodies</button>
      <button class="filter" data-category="T-shirts">T-shirts</button>
      <button class="filter" data-category="Sneakers">Sneakers</button>
      <button class="filter" data-category="Accessories">Accessories</button>
    </div>

    <!-- Products injected here by JS -->
    <div class="grid" id="grid">

      <!-- Loading placeholder -->
      <p>Loading products...</p>
    </div>
  </main>



  <!-- Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/shop.js"></script>
  <script type="module" src="js/seed.js"></script>
</body>
</html>
